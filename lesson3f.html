
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=\, initial-scale=1.0">
  <title>Arkan</title>
  <style>
    a:hover{
      color: orange !important;
    }
    .add{
      color: black; 
      background-color: rgb(255, 216, 20); 
      border: 1px; 
      border-radius: 20px; 
      width: 100px; 
      padding: 5px; 
      cursor: pointer;
    }
    .buy{
      color: black; 
      background-color: rgb(255, 164, 28); 
      border: 1px; border-radius: 20px; 
      width: 100px; 
      padding: 5px; 
      cursor: pointer;
    }
    .add:focus{
      background-color: rgba(255, 216, 20, 0.7) !important;
    }
    .add:hover{
      background-color: rgb(196, 165, 14);
    }
    .buy:focus{
      background-color: rgba(255, 164, 28, 0.7) !important;
    }
    .buy:hover{
      background-color: rgb(209, 135, 23);
    }
  </style>
</head>
<body>
  <a href="https://www.amazon.com/" style="color: rgb(0, 113, 133);">Back to Amazon</a>
  <h1><b class="nike">Nike Black Running Shoes</b></h1>
  <p>
    <span style="color: rgb(0, 118, 0); font-weight: bold;">$39 - in stock.</span>
    <br>
    <br>
    Free delivery tomorrow.
  </p>
  <button class="add">Add to Cart</button>
  <button class="buy">Buy now</button>
</body>
</html>
