
<html lang="en">
<head>
  <title>Ibnu</title>
  <style>
    button{
      border-radius: 25px;
      padding: 11px;
      font-family: tahoma;
      font-weight: bold;
    }
    .apply{
      border: 1px;
      border-color: rgb(10, 102, 194);
      border-style: solid;
      background-color: rgb(10, 102, 194);
      color: white;
    }
    .save{
      background-color: white;
      color: rgb(10, 102, 194);
      border: 1px;
      border-color: rgb(10, 102, 194);
      border-style: solid;
      width: 70px;
    }
    .apply:hover{
      background-color: rgb(2, 55, 107);
      cursor: pointer;
    }
    .save:hover{
      background-color: rgba(8, 100, 192, 0.336);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <button class="apply">Apply</button>
  <button class="save">Save</button>
</body>
</html
