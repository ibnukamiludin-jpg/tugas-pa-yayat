<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibnu</title>
</head>
<body>
    <style>
        body{
    font-family: Arial;
}

.profil{
    width: 50px;
    height: 50px;
    vertical-align: middle;
    border-radius: 100%;
}

.teks{
    border: none;
    font-size: 14px;
    width: 230px;
    margin-left: 8px;
    vertical-align: middle;
}

.tweet{
    background: rgb(10, 102, 194);
    color: white;
    font-size: 16px;
    font-weight: bold;
    border-radius: 20px;
    border: none;
    padding: 9px 18px;
    cursor: pointer;
    margin-left: 2px;
}

.box{
    border:  white;
    width: 450px;
    padding: 10px;
    border-radius: 10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.5);
}
    </style>
    <center>
        <div class="box">
        <img src="gambar1.png" class="profil">
        <input type="text" placeholder="What's happening?" class="teks">
        <button class="tweet">Tweet</button>
    </div>
</center>
</body>
</html>
