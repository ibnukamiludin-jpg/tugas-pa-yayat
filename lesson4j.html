<html>
<head>
  <title>Ibnu</title>
  <style>
    button{
      padding: 10px 20px;
      font-size: 15px;
      color: white;
      background-color: purple;
      border: none;
      box-shadow: 3px 3px 5px rgba(0, 0, 0, 0.2);
      cursor: pointer;
    }
    button:hover {
      box-shadow: 3px 3px 5px rgba(0, 0, 0, 0.3);
}
    button:active {
      box-shadow: 0px 0px 0px rgba(0, 0, 0, 0.4);
      transform: translateY(3px);
}
  </style>
</head>
<body>
  <button>Submit</button>
<select>
	<option>HTML</option>
	<option>CSS</option>
	<option>JAVA</option>
</select>
<button>Back</button>
</body>
</html>
