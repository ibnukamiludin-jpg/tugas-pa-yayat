<html>
<head>
  <title>Ibnu</title>
  <style>
    button{
      background-color: orange;
      border: orange;
      padding: 15px 10px;
      color: white;
      margin: 0px 20px;
      transition: 1s;
    }
    button:hover{
      padding: 15px 30px;
      cursor: pointer;
      margin: 0px;
    }
  </style>
</head>
<body>
  <button>Satu</button>
  <button>Dua</button>
  <button>Tiga</button>
</body>
</html>
